services:
  - type: web
    name: preco-certo-auth
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements-fastapi.txt
    startCommand: uvicorn auth_fastapi:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: AUTH_CORS_ALLOWED_ORIGINS
        value: https://SEU-USUARIO.github.io
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_OWNER
        value: JeffiBR
      - key: GITHUB_REPO
        value: Dados
      - key: GITHUB_BRANCH
        value: main
      - key: AUTH_SECRET
        sync: false
      - key: AUTH_TOKEN_TTL_SECONDS
        value: 2592000
      - key: AUTH_PASSWORD_RESET_TTL_SECONDS
        value: 900
      - key: AUTH_PASSWORD_RESET_CODE_LENGTH
        value: 6
      - key: AUTH_PASSWORD_RESET_EXPOSE_CODE
        value: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: Preço Certo
      - key: AUTH_PASSWORD_RESET_PAGE_URL
        value: https://jeffibr.github.io/Service/reset-password.html
