# Configuração do Render para deploy automático
# Documentação: https://render.com/docs/blueprint-spec

services:
  # Web Service - API Backend
  - type: web
    name: thunderplay-iptv
    rootDir: backend
    runtime: node
    region: oregon # ou ohio, frankfurt, singapore, etc.
    plan: free # free, starter, standard, pro
    branch: main
    buildCommand: npm install
    startCommand: npm start
    
    # Configurações de saúde
    healthCheckPath: /api/health
    
    # Variáveis de ambiente
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ALLOWED_ORIGINS
        value: https://SEU-USUARIO.github.io
      - key: GITHUB_TOKEN
        sync: false # Defina manualmente no dashboard do Render
      - key: GITHUB_OWNER
        value: JeffiBR
      - key: GITHUB_REPO
        value: Dados
      - key: GITHUB_BRANCH
        value: main
      - key: BACKUP_ENABLED
        value: true
      - key: REQUIRE_USER_CONTEXT
        value: true
      - key: AUTH_PASSWORD_RESET_TTL_SECONDS
        value: 900
      - key: AUTH_PASSWORD_RESET_CODE_LENGTH
        value: 6
      - key: AUTH_PASSWORD_RESET_EXPOSE_CODE
        value: false
      - key: AUTH_PASSWORD_RESET_PAGE_URL
        value: https://jeffibr.github.io/Service/reset-password.html
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: Preco Certo
      - key: BREVO_API_BASE
        value: https://api.brevo.com

# Dica: Após criar o serviço, acesse o dashboard do Render
# e configure o GITHUB_TOKEN nas variáveis de ambiente
